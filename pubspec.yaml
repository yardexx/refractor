name: refractor
description: A Dart kernel (.dill) obfuscation tool.
version: 0.1.0
publish_to: none
repository: https://github.com/yardexx/refractor

environment:
  sdk: ^3.10.0

dependencies:
  args: ^2.4.0
  checked_yaml: ^2.0.3
  cli_completion: ^0.5.1
  glob: ^2.1.2
  json_annotation: ^4.9.0
  kernel:
    path: third_party/kernel
  kernel_model:
    path: pkg/kernel_model
  mason_logger: ^0.3.3
  path: ^1.8.0
  yaml: ^3.1.0

executables:
  refractor: refractor

dev_dependencies:
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  lints: ^3.0.0
  mocktail: ^1.0.4
  test: ^1.24.0
  very_good_analysis: ^10.1.0
